name: Zbuduj i opublikuj release

on:
  push:
    branches:
      - main
    paths:
      - "servers/**/*.png"
      - "servers/**/manifest.json"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Skonfiguruj Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Zainstaluj zależności
        run: npm ci

      - name: Zbuduj plik wynikowy
        run: npm run build

      - name: Opublikuj dist na branchu `dist` (serwowane przez raw.githubusercontent.com)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

          # Osobny worktree, żeby nie mieszać wygenerowanych plików z historią źródeł na main.
          git fetch origin dist || true
          if git show-ref --verify --quiet refs/remotes/origin/dist; then
            git worktree add dist-publish origin/dist
          else
            git worktree add --detach dist-publish
            git -C dist-publish checkout --orphan dist
            git -C dist-publish rm -rf . > /dev/null 2>&1 || true
          fi

          rm -rf dist-publish/*
          cp -r dist/* dist-publish/

          cd dist-publish
          git add -A
          if git diff --cached --quiet; then
            echo "Brak zmian w dist, pomijam commit."
          else
            git commit -m "Build dist z ${GITHUB_SHA::7}"
            git push origin HEAD:dist
          fi

      - name: Spakuj katalog dist
        run: zip -r dist.zip dist

      - name: Utwórz tag
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"
          TAG="release-${GITHUB_SHA::7}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG już istnieje na origin, pomijam (prawdopodobnie ręczny re-run tego samego commita)."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Utwórz GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files:    dist.zip
          tag_name: release-${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}